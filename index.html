<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Birthday Journey | Forever ❤️</title>
    <style>
        /* Black Premium Theme */
        body { 
            background-color: #000000; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            transition: background 0.5s; 
        }
        
        .card { 
            max-width: 400px; 
            width: 85%; 
            background: rgba(17, 17, 17, 0.9); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.4); 
            text-align: center; 
            border: 1px solid #333; 
            z-index: 10; 
            position: relative;
        }

        .profile-pic { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 4px solid #ff4d6d; 
            object-fit: cover; 
            margin-bottom: 25px; 
            box-shadow: 0 0 15px #ff4d6d; 
            transition: 0.5s ease;
            opacity: 1;
        }
        
        #message-box { 
            font-size: 1.15rem; 
            line-height: 1.7; 
            min-height: 160px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px; 
            transition: opacity 0.3s;
        }
        
        .btn { 
            background: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.05rem; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }
        .btn:hover { transform: scale(1.1); background: #ff758f; }

        /* Floating Symbols Animation */
        .symbol { 
            position: fixed; 
            top: -10%; 
            color: #ff4d6d; 
            animation: move 3.5s linear infinite; 
            text-shadow: 0 0 5px #ff4d6d; 
            z-index: 1; 
            opacity: 0.6;
        }
        @keyframes move { 0% { transform: translateY(0vh) rotate(0deg); } 100% { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="vidhi.jpg" class="profile-pic" alt="Our Journey" id="mainPhoto">
        
        <h1 style="color: #ff4d6d; font-size: 1.7rem; margin-top: 0; text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);">Happy Birthday! ❤️</h1>
        <div id="message-box">Today is a special day... I have a few things I've always wanted to tell you.</div>
        
        <button class="btn" onclick="nextStep()" id="btn">Open My Heart</button>
    </div>

    <script>
        let currentStep = 0;
        
        // Define which photo to show for which message index
        const photoSchedule = [
            "IMG.jpg",    // For message 1
            "vidhi.jpg",  // For message 2
            "IMG.jpg",    // For message 3
            "vidhi.jpg",  // For message 4
            "IMG.jpg",    // For message 5
            "vidhi.jpg",  // For message 6
            "vidhi.jpg"   // Final Forever
        ];

        const msgs = [
            "It's been one amazing year since we first met, and you have changed my life for the better.",
            "I'm sorry for never officially proposing. I never wanted you to feel any pressure or overthink.",
            "Please know that my love for you is a commitment to myself. Even if you ever leave, I will still love you.",
            "I don't just want to share your happy moments. I deserve to be there for your sad days too—perhaps even more.",
            "If I ever irritate or disturb you, please just scold me! But never hide your pain from me.",
            "I love you more than words can express, sweetheart. You are my everything, forever. ❤️"
        ];

        // Symbols related to each message theme
        const symbolSets = [
            ["❤️", "🎉", "✨", "🌟"], // Start
            ["🌱", "🌅", "💫", "Change"], 
            ["Sorry", "🙏", "Pressure", "x"], 
            ["🔗", "Commit", "Hamesha", "❤️"], 
            ["🌻", "🛡️", "Safety", "Freedom"], 
            ["🌨️", "Share", "Deserve", "All"], 
            ["Forever", "😘", "Sweetheart", "❤️"] // End
        ];

        let currentSymbols = symbolSets[0];

        function nextStep() {
            const box = document.getElementById("message-box");
            const button = document.getElementById("btn");
            const photo = document.getElementById("mainPhoto");
            
            // Fading animation for photo and message
            photo.style.opacity = 0;
            box.style.opacity = 0;
            
            setTimeout(() => {
                if(currentStep < msgs.length) {
                    // Update content
                    box.innerHTML = msgs[currentStep];
                    button.innerHTML = "Next Story →";
                    
                    // Update photo based on schedule
                    photo.src = photoSchedule[currentStep];
                    
                    // Update background symbols theme
                    currentSymbols = symbolSets[currentStep + 1];
                    
                    currentStep++;
                } else {
                    // Final "I LOVE YOU FOREVER" screen
                    box.innerHTML = "<b style='font-size: 1.6rem; color: #ff4d6d; text-shadow: 0 0 10px #ff4d6d;'>I LOVE YOU FOREVER! 🎂❤️</b>";
                    button.style.display = "none";
                    photo.src = "vidhi.jpg"; // Finish on her photo
                    photo.style.border = "4px solid #fff";
                    photo.style.boxShadow = "0 0 20px #fff";
                    currentSymbols = symbolSets[symbolSets.length - 1];
                }
                
                // Fade-in animation
                photo.style.opacity = 1;
                box.style.opacity = 1;
                
            }, 300); // Short delay for fade out
        }

        // Global falling symbols generator
        setInterval(() => {
            const s = document.createElement('div');
            s.classList.add('symbol');
            // Select random symbol from current theme
            s.innerHTML = currentSymbols[Math.floor(Math.random() * currentSymbols.length)];
            s.style.left = Math.random() * 100 + 'vw';
            s.style.fontSize = (Math.random() * 20 + 15) + 'px';
            s.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 3500);
        }, 300);
    </script>
</body>
</html>
